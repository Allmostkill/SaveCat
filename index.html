window.addEventListener('load', function() {

var cv = document.getElementById('c');
var cx = cv.getContext('2d');
var W, H, S, FL;

function resize() {
  var tiH = document.getElementById('ti').offsetHeight || 28;
  var avW = window.innerWidth;
  var avH = window.innerHeight - tiH - 6;
  // соотношение 9:16
  if (avW / avH < 9/16) { W = avW; H = Math.floor(W * 16/9); }
  else { H = avH; W = Math.floor(H * 9/16); }
  if (H > avH) { H = avH; W = Math.floor(H * 9/16); }
  W = Math.max(240,W); H = Math.max(400,H);
  cv.width = W; cv.height = H;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  S = W/360;
  FL = H - Math.round(44*S);
}
resize();
window.addEventListener('resize', resize);

// ── картинки ──
var sultCv=null, botCv=null, canImg=null, shieldImg=null, imgOk=0;

function rmBlack(img) {
  var o=document.createElement('canvas'); o.width=img.width; o.height=img.height;
  var x=o.getContext('2d'); x.drawImage(img,0,0);
  var d=x.getImageData(0,0,o.width,o.height),px=d.data;
  for(var i=0;i<px.length;i+=4){
    var r=px[i],g=px[i+1],b=px[i+2],br=(r+g+b)/3;
    // Only remove near-pure-black pixels (background), keep dark blue suit
    var isBlack = r<40 && g<40 && b<40;
    var isNearBlack = r<55 && g<55 && b<55;
    if(isBlack){px[i+3]=0;}
    else if(isNearBlack){px[i+3]=Math.round((Math.max(r,g,b)-40)/15*255);}
  }
  x.putImageData(d,0,0); return o;
}
function rmWhite(img) {
  var o=document.createElement('canvas'); o.width=img.width; o.height=img.height;
  var x=o.getContext('2d'); x.drawImage(img,0,0);
  var d=x.getImageData(0,0,o.width,o.height),px=d.data;
  for(var i=0;i<px.length;i+=4){
    var r=px[i],g=px[i+1],b=px[i+2];
    if(r>232&&g>232&&b>232){px[i+3]=0;}
    else if(r>205&&g>205&&b>205){px[i+3]=Math.round((255-Math.min(r,g,b))/50*255);}
  }
  x.putImageData(d,0,0); return o;
}

// ── стейт ──
var state='loading';
var score=0,lives=3,level=1,fc=0;
var spawnT=0,sulT=0,spawnI=80;
var dropSpd,maxB,depSpd;
var depX,depTX,depMT;
var catX,catVX=0,catDir=1,catAF=0,catAT=0,catInv=0;
var bottles=[],parts=[],bonus=null;
var bonusT=0,bonusI=900,shieldT=0,cansGot=0;
var sTimer=0,sReady=false;
var K={left:false,right:false};

function applyDiff(){
  spawnI=Math.max(14,80-level*7);
  dropSpd=Math.min(11*S,(3+level*0.65)*S);
  maxB=Math.min(9,2+Math.floor(level/2));
  depSpd=Math.min(5.5*S,(1.4+level*0.36)*S);
}
function startGame(){
  score=0;lives=3;level=1;fc=0;
  catX=W/2;catVX=0;catDir=1;catAF=0;catAT=0;catInv=0;
  depX=W/2;depTX=W/2;depMT=0;
  bottles=[];parts=[];bonus=null;
  bonusT=0;bonusI=900;shieldT=0;cansGot=0;
  applyDiff();
  state='play';
}

// ── тач ──
function updTouch(touches){
  if(!touches||!touches.length){K.left=false;K.right=false;return;}
  var rect=cv.getBoundingClientRect();
  var tx=touches[0].clientX-rect.left;
  K.left=tx<W/2-8;
  K.right=tx>=W/2+8;
}
cv.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(state==='splash'&&sReady){startGame();return;}
  if(state==='dead'){startGame();return;}
  updTouch(e.touches);
},{passive:false});
cv.addEventListener('touchmove',function(e){e.preventDefault();updTouch(e.touches);},{passive:false});
cv.addEventListener('touchend',function(e){e.preventDefault();updTouch(e.touches);},{passive:false});
window.addEventListener('keydown',function(e){
  if(e.code==='ArrowLeft'||e.code==='KeyA')K.left=true;
  if(e.code==='ArrowRight'||e.code==='KeyD')K.right=true;
  if(state==='splash'&&sReady)startGame();
  if(state==='dead'&&e.code==='Space')startGame();
});
window.addEventListener('keyup',function(e){
  if(e.code==='ArrowLeft'||e.code==='KeyA')K.left=false;
  if(e.code==='ArrowRight'||e.code==='KeyD')K.right=false;
});

// ── частицы ──
function pts(x,y,col,n){
  for(var i=0;i<n;i++)parts.push({
    x:x,y:y,vx:(Math.random()-.5)*7*S,vy:(Math.random()-1.6)*5*S,
    r:(1.5+Math.random()*3)*S,life:1,col:col});
}

// ── депутат ──
function updDep(){
  depMT++;
  var freq=Math.max(20,55-level*4);
  if(depMT>freq){depMT=0;depTX=Math.random()<0.85?catX:20*S+Math.random()*(W-40*S);}
  var dx=depTX-depX;
  if(Math.abs(dx)>2)depX+=Math.sign(dx)*depSpd*dt;
  depX=Math.max(12*S,Math.min(W-12*S,depX));
}
function spawn(){
  var bx=Math.max(8*S,Math.min(W-8*S,depX));
  bottles.push({x:bx,y:80*S,vy:dropSpd,rot:0,rs:(Math.random()-.5)*.08,dead:false,trail:[]});
  sulT=20;
}

// ── рисование ──
function drawBG(){
  cx.fillStyle='#0d1520';cx.fillRect(0,0,W,H);
  cx.fillStyle='#3a2a10';cx.fillRect(0,FL,W,H-FL);
  cx.fillStyle='rgba(255,160,40,0.18)';cx.fillRect(0,FL-5*S,W,5*S);
  cx.fillStyle='#5a4020';cx.fillRect(0,FL,W,3*S);
  if(fc%2===0){for(var i=0;i<14;i++){
    var sx=(i*211)%W,sy=(i*137)%(FL*.85);
    cx.fillStyle='rgba(255,255,255,'+(0.06+0.12*Math.sin(fc*.03+i))+')';
    cx.fillRect(sx,sy,1.5,1.5);
  }}
}

function drawShadows(){
  for(var i=0;i<bottles.length;i++){
    var b=bottles[i],prog=Math.min(1,b.y/FL);
    var alpha=0.06+prog*.72,sz=(4+prog*20)*S,pulse=.65+.35*Math.sin(fc*.2+i);
    cx.save();cx.globalAlpha=alpha*.85;
    cx.fillStyle='rgba(255,40,0,'+pulse+')';
    cx.beginPath();cx.ellipse(b.x,FL+2*S,sz*.65,3.5*S,0,0,Math.PI*2);cx.fill();
    cx.globalAlpha=alpha*.25;cx.strokeStyle='#ff6600';cx.lineWidth=1.5;
    cx.setLineDash([3*S,5*S]);
    cx.beginPath();cx.moveTo(b.x,b.y+26*S);cx.lineTo(b.x,FL);cx.stroke();
    cx.setLineDash([]);cx.restore();
  }
}

function drawDep(){
  var DW=86*S,DH=114*S,bob=Math.sin(fc*.05)*2.5*S;
  cx.save();cx.translate(depX-DW/2,8*S+bob);
  if(sultCv)cx.drawImage(sultCv,0,0,DW,DH);
  else{cx.fillStyle='#1e2d4a';cx.beginPath();cx.ellipse(DW/2,DH*.6,28*S,36*S,0,0,Math.PI*2);cx.fill();}
  if(sulT>0){cx.globalAlpha=.3;cx.fillStyle='#ff8800';cx.beginPath();cx.arc(DW/2,DH*.77,15*S,0,Math.PI*2);cx.fill();}
  cx.restore();
}

function drawBot(b){
  var BW=28*S,BH=52*S;
  if(b.trail.length>0){
    cx.save();cx.globalAlpha=.2;cx.fillStyle='#6ec6ff';
    cx.beginPath();cx.arc(b.trail[0].x,b.trail[0].y,2*S,0,Math.PI*2);cx.fill();cx.restore();
  }
  cx.save();cx.translate(b.x,b.y);cx.rotate(b.rot);
  if(botCv)cx.drawImage(botCv,-BW/2,-BH/2,BW,BH);
  else{cx.fillStyle='rgba(100,180,240,.85)';cx.fillRect(-BW/2,-BH/2,BW,BH);}
  cx.restore();
}

function drawCat(){
  if(catInv>0&&Math.floor(fc/4)%2===0)return;
  var cy=FL-20*S;
  cx.save();cx.translate(catX,cy);if(catDir<0)cx.scale(-1,1);
  var run=Math.floor(catAF)%2;
  cx.fillStyle='rgba(0,0,0,.2)';cx.beginPath();cx.ellipse(0,22*S,15*S,4*S,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#e8783a';cx.beginPath();cx.ellipse(0,4*S,16*S,13*S,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#f5c090';cx.beginPath();cx.ellipse(S,6*S,9*S,8*S,0,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#c45a1a';cx.lineWidth=2*S;
  [-8,-2,5].forEach(function(xi){cx.beginPath();cx.moveTo(xi*S,-2*S);cx.lineTo(xi*S,9*S);cx.stroke();});
  cx.strokeStyle='#e8783a';cx.lineWidth=5*S;cx.lineCap='round';
  var tw=Math.sin(fc*.15)*.7;
  cx.beginPath();cx.moveTo(-16*S,6*S);cx.quadraticCurveTo(-28*S,-2*S+tw*9*S,-22*S,-19*S+tw*5*S);cx.stroke();
  cx.strokeStyle='#ffd0a0';cx.lineWidth=2*S;
  cx.beginPath();cx.moveTo(-22*S,-17*S);cx.lineTo(-20*S,-24*S);cx.stroke();
  cx.fillStyle='#e8783a';cx.beginPath();cx.arc(2*S,-12*S,13*S,0,Math.PI*2);cx.fill();
  cx.fillStyle='#f5c090';cx.beginPath();cx.ellipse(2*S,-14*S,7*S,5*S,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#e8783a';
  cx.beginPath();cx.moveTo(-8*S,-21*S);cx.lineTo(-18*S,-33*S);cx.lineTo(-2*S,-22*S);cx.fill();
  cx.beginPath();cx.moveTo(11*S,-21*S);cx.lineTo(20*S,-33*S);cx.lineTo(5*S,-22*S);cx.fill();
  cx.fillStyle='#f5a0a0';
  cx.beginPath();cx.moveTo(-8*S,-22*S);cx.lineTo(-14*S,-30*S);cx.lineTo(-3*S,-23*S);cx.fill();
  cx.beginPath();cx.moveTo(11*S,-22*S);cx.lineTo(16*S,-30*S);cx.lineTo(6*S,-23*S);cx.fill();
  cx.fillStyle='#fff';
  cx.beginPath();cx.ellipse(-5*S,-13*S,4.5*S,3.8*S,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(9*S,-13*S,4.5*S,3.8*S,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#2a8a20';

function drawBonus(){
  if(!bonus||!bonus.alive)return;
  bonus.pulse=(bonus.pulse||0)+1;
  var bob=Math.sin(bonus.pulse*.08)*3*S;
  cx.save();cx.translate(bonus.x,FL-22*S+bob);
  var glow=.35+.35*Math.sin(bonus.pulse*.1);
  cx.fillStyle='rgba(0,220,200,'+glow+')';
  cx.beginPath();cx.arc(0,0,22*S,0,Math.PI*2);cx.fill();
  if(shieldImg)cx.drawImage(shieldImg,-14*S,-26*S,28*S,50*S);
  else{cx.fillStyle='#00dcc8';cx.fillRect(-14*S,-26*S,28*S,50*S);}
  cx.fillStyle='rgba(0,220,200,'+(0.7+.3*Math.sin(bonus.pulse*.12))+')';
  cx.font=Math.round(10*S)+'px monospace';cx.textAlign='center';
  cx.fillText('\u26a1',0,-30*S);
  cx.restore();
}

function drawHUD(){
  cx.fillStyle='rgba(0,0,0,.6)';cx.fillRect(4*S,4*S,140*S,30*S);
  cx.strokeStyle='rgba(255,215,0,.35)';cx.lineWidth=1;cx.strokeRect(4*S,4*S,140*S,30*S);
  cx.fillStyle='#ffd700';cx.font='bold '+Math.round(11*S)+'px monospace';cx.textAlign='left';
  cx.fillText('СЧЁТ: '+score,9*S,24*S);
  cx.textAlign='right';cx.fillStyle='#ff6b6b';
  var h='';for(var i=0;i<lives;i++)h+='\u2764';
  cx.fillText(h||'\u2620',W-7*S,24*S);
  cx.textAlign='center';
  cx.fillStyle='rgba(0,0,0,.45)';cx.fillRect(W/2-24*S,4*S,48*S,17*S);
  var lhue=Math.max(0,120-level*13);
  cx.fillStyle='hsl('+lhue+',80%,55%)';cx.font='bold '+Math.round(9*S)+'px monospace';
  cx.fillText('LVL '+level,W/2,16*S);
  var pct=Math.min(1,(level-1)/9);
  cx.fillStyle='rgba(0,0,0,.4)';cx.fillRect(W/2-44*S,24*S,88*S,5*S);
  var bg=cx.createLinearGradient(W/2-44*S,0,W/2+44*S,0);
  bg.addColorStop(0,'#00e676');bg.addColorStop(.5,'#ffeb3b');bg.addColorStop(1,'#ff1744');
  cx.fillStyle=bg;cx.fillRect(W/2-44*S,24*S,88*S*pct,5*S);
  // touch hint first 5 sec
  if(fc<300){
    var ha=fc<240?0.3:(300-fc)/60*.3;
    cx.save();cx.globalAlpha=ha;
    cx.fillStyle='rgba(255,255,255,.07)';
    cx.fillRect(0,FL*.3,W/2-2,FL*.65);cx.fillRect(W/2+2,FL*.3,W/2-2,FL*.65);
    cx.globalAlpha=ha*1.6;cx.fillStyle='#fff';
    cx.font=Math.round(24*S)+'px monospace';cx.textAlign='center';
    cx.fillText('\u25c4',W/4,FL*.62);cx.fillText('\u25ba',W*3/4,FL*.62);
    cx.restore();
  }
}

function drawSplash(){
  cx.fillStyle='#060c18';cx.fillRect(0,0,W,H);
  var pulse=.15+.08*Math.sin(sTimer*.04);
  var gr=cx.createRadialGradient(W/2,H*.42,10,W/2,H*.42,160*S);
  gr.addColorStop(0,'rgba(0,220,200,'+pulse+')');gr.addColorStop(1,'transparent');
  cx.fillStyle=gr;cx.fillRect(0,0,W,H);
  var CH=Math.round(H*.50),CW=Math.round(CH*.52);
  var bob=Math.sin(sTimer*.04)*4*S;
  if(canImg){
    cx.save();cx.translate(W/2,H*.1+CH/2+bob);cx.rotate(Math.sin(sTimer*.025)*.04);
    cx.drawImage(canImg,-CW/2,-CH/2,CW,CH);cx.restore();
  }
  cx.textAlign='center';
  cx.shadowColor='#00dcc8';cx.shadowBlur=20*S;
  cx.fillStyle='#fff';cx.font='bold '+Math.round(28*S)+'px Arial,sans-serif';
  cx.fillText('LiT ENERGY',W/2,H*.72);cx.shadowBlur=0;
  cx.fillStyle='#00dcc8';cx.font=Math.round(10*S)+'px monospace';
  cx.fillText('\u26a1 ЗАРЯЖАЙ ПОБЕДУ \u26a1',W/2,H*.775);
  var pb=.4+.55*Math.sin(sTimer*.08);
  cx.fillStyle='rgba(200,200,200,'+pb+')';cx.font=Math.round(12*S)+'px monospace';
  cx.fillText(sReady?'\u2014 ТАП ЧТОБЫ ИГРАТЬ \u2014':'загрузка...',W/2,H*.865);
  cx.fillStyle='rgba(80,80,80,.55)';cx.font=Math.round(8*S)+'px monospace';
  cx.fillText('представляет  ВОДНЫЙ КОНГ',W/2,H*.92);
}

function drawDead(){
  cx.fillStyle='rgba(0,0,0,.8)';cx.fillRect(0,0,W,H);
  var pw=W*.82,ph=H*.52,px=W/2-pw/2,py=H/2-ph/2;
  cx.fillStyle='rgba(18,0,0,.95)';cx.fillRect(px,py,pw,ph);
  cx.strokeStyle='rgba(255,60,60,.45)';cx.lineWidth=1.5;cx.strokeRect(px,py,pw,ph);
  cx.textAlign='center';
  cx.shadowColor='#ff2020';cx.shadowBlur=18*S;
  cx.fillStyle='#ff4455';cx.font='bold '+Math.round(30*S)+'px Arial,sans-serif';
  cx.fillText('GAME OVER',W/2,py+ph*.24);cx.shadowBlur=0;
  cx.fillStyle='rgba(200,200,200,.75)';cx.font=Math.round(11*S)+'px monospace';
  cx.fillText('Котёнок не уцелел...',W/2,py+ph*.38);
  cx.shadowColor='#ffd700';cx.shadowBlur=10*S;
  cx.fillStyle='#ffd700';cx.font='bold '+Math.round(26*S)+'px monospace';
  cx.fillText(score+' очков',W/2,py+ph*.56);cx.shadowBlur=0;
  if(cansGot>0){
    cx.fillStyle='rgba(0,220,200,.9)';cx.font=Math.round(12*S)+'px monospace';
    cx.fillText('\u26a1 банок LIT: '+cansGot,W/2,py+ph*.7);
  }
  var a=.4+.5*Math.sin(fc*.1);
  cx.fillStyle='rgba(120,190,255,'+a+')';cx.font=Math.round(11*S)+'px monospace';
  cx.fillText('ТАП / ПРОБЕЛ — снова',W/2,py+ph*.87);
}

// ── главный цикл ──
function loop(now){
  requestAnimationFrame(loop);
  // delta time — нормализуем к 60fps
  var dt = now ? Math.min((now - (loop.last||now)) / 16.67, 3) : 1;
  loop.last = now;
  cx.clearRect(0,0,W,H);

  if(state==='loading'){
    cx.fillStyle='#060c18';cx.fillRect(0,0,W,H);
    cx.fillStyle='#ffd700';cx.font='bold '+Math.round(14*S)+'px monospace';cx.textAlign='center';
    cx.fillText('Загрузка '+imgOk+'/4...',W/2,H/2);
    return;
  }
  if(state==='splash'){
    sTimer++;if(sTimer>50)sReady=true;
    drawSplash();return;
  }

  drawBG();drawShadows();drawDep();
  for(var pi=0;pi<parts.length;pi++){
    var p=parts[pi];cx.save();cx.globalAlpha=p.life;cx.fillStyle=p.col;
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();cx.restore();
  }
  for(var bi=0;bi<bottles.length;bi++)drawBot(bottles[bi]);
  drawShield();drawCat();drawBonus();drawHUD();

  if(state==='play'){
    fc++;
    // кот
    if(K.left){catVX=-5.5*S;catDir=-1;}
    else if(K.right){catVX=5.5*S;catDir=1;}
    else catVX*=Math.pow(.72,dt);
    catX+=catVX*dt;
    catX=Math.max(18*S,Math.min(W-18*S,catX));
    if(Math.abs(catVX)>.5){catAT++;if(catAT>6){catAF++;catAT=0;}}
    if(catInv>0)catInv--;

    updDep();

    // бутылки — только вертикально
    for(var i=0;i<bottles.length;i++){
      var b=bottles[i];
      b.trail.push({x:b.x,y:b.y});if(b.trail.length>3)b.trail.shift();
      b.vy+=.13*S*dt;b.y+=b.vy*dt;b.rot+=b.rs*dt;
      if(b.y>H+40*S){b.dead=true;score+=4;}
    }
    bottles=bottles.filter(function(b){return!b.dead;});

    // столкновение
    if(catInv===0){
      var cy2=FL-20*S;
      for(var i=0;i<bottles.length;i++){
        var b=bottles[i];
        if(Math.abs(b.x-catX)<26*S&&Math.abs(b.y-cy2)<32*S){
          b.dead=true;lives--;catInv=80;
          pts(catX,cy2,'#ff4455',12);pts(catX,cy2,'#6ec6ff',10);
          if(lives<=0)state='dead';
        }
      }
    }

    // частицы
    for(var i=0;i<parts.length;i++){var p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=.15*S*dt;p.life-=.025*dt;}
    parts=parts.filter(function(p){return p.life>0;});

    if(sulT>0)sulT--;
    spawnT++;
    if(spawnT>=spawnI&&bottles.length<maxB){spawnT=0;spawn();
      if(level>=5)setTimeout(function(){if(state==='play')spawn();},200);
      if(level>=8)setTimeout(function(){if(state==='play')spawn();},400);}

    // бонус
    bonusT++;
    if(bonusT>=bonusI&&!bonus){
      bonus={x:20*S+Math.random()*(W-40*S),alive:true,pulse:0};
      bonusT=0;bonusI=900+Math.floor(Math.random()*300);
    }
    if(bonus&&bonus.alive){
      var cy3=FL-20*S;
      if(Math.abs(bonus.x-catX)<22*S&&Math.abs((FL-22*S)-cy3)<30*S){
        bonus.alive=false;bonus=null;shieldT=360;cansGot++;
        pts(catX,cy3,'#00dcc8',16);pts(catX,cy3,'#00ff88',10);
      }
    }
    if(shieldT>0){shieldT--;catInv=Math.max(catInv,2);}

    // уровень
    var nl=1+Math.floor(score/120);
    if(nl!==level){level=nl;applyDiff();pts(W/2,H/2,'#ffd700',20);pts(W/2,H/2,'#ff8c00',12);}

  } else if(state==='dead'){
    fc++;drawDead();
  }
}

requestAnimationFrame(loop);

}); // end window.load
</script>
</body>
</html>
