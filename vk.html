function rmBlack(img) {
  var oc = document.createElement('canvas');
  oc.width = img.width; oc.height = img.height;
  var ox = oc.getContext('2d');
  ox.drawImage(img, 0, 0);
  var id = ox.getImageData(0, 0, oc.width, oc.height);
  var d = id.data;
  for (var i = 0; i < d.length; i += 4) {
    var r=d[i],g=d[i+1],b=d[i+2],br=(r+g+b)/3;
    if (br < 50 && Math.max(r,g,b) < 65) d[i+3]=0;
    else if (br < 85 && Math.max(r,g,b) < 100) d[i+3]=Math.round((br-50)/35*255);
  }
  ox.putImageData(id, 0, 0);
  return oc;
}

function rmWhite(img) {
  var oc = document.createElement('canvas');
  oc.width = img.width; oc.height = img.height;
  var ox = oc.getContext('2d');
  ox.drawImage(img, 0, 0);
  var id = ox.getImageData(0, 0, oc.width, oc.height);
  var d = id.data;
  for (var i = 0; i < d.length; i += 4) {
    var r=d[i],g=d[i+1],b=d[i+2];
    if (r>232 && g>232 && b>232) d[i+3]=0;
    else if (r>205 && g>205 && b>205) d[i+3]=Math.round((255-Math.min(r,g,b))/50*255);
  }
  ox.putImageData(id, 0, 0);
  return oc;
}

// ввод
window.addEventListener('keydown', function(e) {
  K[e.code] = true;
  if (state==='splash' && sReady) startGame();
  if (state==='dead' && e.code==='Space') startGame();
});
window.addEventListener('keyup', function(e) { K[e.code] = false; });

var tStart = null;
cv.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (state==='splash' && sReady) { startGame(); return; }
  if (state==='dead') { startGame(); return; }
  tStart = e.touches[0].clientX;
}, {passive:false});
cv.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (tStart === null) return;
  var dx = e.touches[0].clientX - tStart;
  K['ArrowLeft'] = dx < -12;
  K['ArrowRight'] = dx > 12;
}, {passive:false});
cv.addEventListener('touchend', function(e) {
  e.preventDefault();
  K['ArrowLeft'] = false; K['ArrowRight'] = false; tStart = null;
}, {passive:false});

var bl = document.getElementById('bl');
var br = document.getElementById('br');
bl.addEventListener('touchstart',function(e){e.preventDefault();K['ArrowLeft']=true;},{passive:false});
bl.addEventListener('touchend',function(e){e.preventDefault();K['ArrowLeft']=false;},{passive:false});
br.addEventListener('touchstart',function(e){e.preventDefault();K['ArrowRight']=true;},{passive:false});
br.addEventListener('touchend',function(e){e.preventDefault();K['ArrowRight']=false;},{passive:false});

function startGame() {
  score=0; lives=3; level=1; fc=0;
  catX=W/2; catVX=0;
  bottles=[]; parts=[]; bonus=null; bonusTimer=0; bonusInterval=900; shieldTimer=0;
  spawnT=0; sulT=0;
  depX=W/2; depTX=W/2; depMT=0;
  applyDiff();
  state='play';
}

function applyDiff() {
  spawnI = Math.max(14, 80 - level*7);
  dropSpd = Math.min(11*S, (3+level*0.65)*S);
  maxB = Math.min(9, 2+Math.floor(level/2));
  depSpd = Math.min(5.5*S, (1.4+level*0.36)*S);
}

function spawn() {
  // spawn строго под депутатом, никакого горизонтального движения
  var bx = Math.max(8*S, Math.min(W-8*S, depX));
  bottles.push({x:bx, y:80*S, vy:dropSpd, rot:0, rs:(Math.random()-.5)*.08, dead:false, trail:[]});
  sulT = 20;
}

function addPts(x,y,col,n) {
  for(var i=0;i<n;i++) parts.push({
    x:x,y:y,vx:(Math.random()-.5)*6*S,vy:(Math.random()-1.5)*5*S,
    r:(1.5+Math.random()*3)*S,life:1,col:col});
}

// ── рисование фона
function drawBG() {
  cx.fillStyle='#0d1520';
  cx.fillRect(0,0,W,H);
  // пол
  cx.fillStyle='#3a2a10';
  cx.fillRect(0,FL,W,H-FL);
  cx.fillStyle='#5a4020';
  cx.fillRect(0,FL,W,4*S);
  // свечение пола
  cx.fillStyle='rgba(255,160,40,0.15)';
  cx.fillRect(0,FL-6*S,W,6*S);
}

// ── тени от бутылок
function drawShadows() {
  for(var i=0;i<bottles.length;i++) {
    var b = bottles[i];
    var prog = Math.min(1, b.y/FL);
    var alpha = 0.06 + prog*0.7;
    var sz = (4 + prog*20)*S;
    var pulse = 0.65 + 0.35*Math.sin(fc*0.2+i);
    cx.save();
    cx.globalAlpha = alpha*0.85;
    cx.fillStyle = 'rgba(255,40,0,'+pulse+')';
    cx.beginPath();
    cx.ellipse(b.x, FL+2*S, sz*0.65, 3.5*S, 0, 0, Math.PI*2);
    cx.fill();
    // пунктир прямо вниз
    cx.globalAlpha = alpha*0.28;
    cx.strokeStyle = '#ff6600';
    cx.lineWidth = 1.5;
    cx.setLineDash([3*S,5*S]);
    cx.beginPath(); cx.moveTo(b.x, b.y+26*S); cx.lineTo(b.x, FL); cx.stroke();
    cx.setLineDash([]);
    cx.restore();
  }
}

// ── депутат
function drawDep() {
  var DW=86*S, DH=114*S;
  var bob = Math.sin(fc*0.05)*2.5*S;
  cx.save();
  cx.translate(depX-DW/2, 8*S+bob);
  if (sultImg) {
    cx.drawImage(sultImg,0,0,DW,DH);
  } else {
    cx.fillStyle='#1e2d4a';
    cx.beginPath(); cx.ellipse(DW/2,DH*.6,28*S,36*S,0,0,Math.PI*2); cx.fill();
    cx.fillStyle='#c0876a';
    cx.beginPath(); cx.arc(DW/2,DH*.24,20*S,0,Math.PI*2); cx.fill();
    cx.fillStyle='#120e07';
    cx.beginPath(); cx.ellipse(DW/2,DH*.41,19*S,15*S,0,0,Math.PI*2); cx.fill();
  }
  if (sulT>0) {
    cx.globalAlpha=0.32;
    cx.fillStyle='#ff8800';
    cx.beginPath(); cx.arc(DW/2,DH*.77,15*S,0,Math.PI*2); cx.fill();
  }
  cx.restore();
}

// ── бутылка
function drawBot(b) {
  var BW=28*S, BH=52*S;
  for(var i=0;i<b.trail.length;i++) {
    cx.save();
    cx.globalAlpha=(i/b.trail.length)*0.25;
    cx.fillStyle='#6ec6ff';
    cx.beginPath();
    cx.arc(b.trail[i].x, b.trail[i].y, Math.max(0.5,(2-i*0.18)*S), 0, Math.PI*2);
    cx.fill();
    cx.restore();
  }
  cx.save();
  cx.translate(b.x, b.y);
  cx.rotate(b.rot);
  if (botImg) {
    cx.drawImage(botImg,-BW/2,-BH/2,BW,BH);
  } else {
    cx.fillStyle='rgba(100,180,240,0.85)';
    cx.fillRect(-BW/2,-BH/2,BW,BH);
    cx.fillStyle='#fff';
    cx.font='bold '+(7*S)+'px monospace';
    cx.textAlign='center';
    cx.fillText('BAIKAL',0,3*S);
  }
  cx.restore();
}

// ── котёнок
function drawCat() {
  var cy = FL-20*S;
  if (lives<=0) return;
  // мигание при неуязвимости
  if (catInv>0 && Math.floor(fc/4)%2===0) return;
  cx.save();
  cx.translate(catX, cy);
  if (catDir<0) cx.scale(-1,1);
  var run = Math.floor(catAF)%2;

  // тень
  cx.fillStyle='rgba(0,0,0,0.2)';
  cx.beginPath(); cx.ellipse(0,22*S,15*S,4*S,0,0,Math.PI*2); cx.fill();

  // тело
  cx.fillStyle='#e8783a';
  cx.beginPath(); cx.ellipse(0,4*S,16*S,13*S,0,0,Math.PI*2); cx.fill();
  cx.fillStyle='#f5c090';
  cx.beginPath(); cx.ellipse(S,6*S,9*S,8*S,0,0,Math.PI*2); cx.fill();

  // полосы
  cx.strokeStyle='#c45a1a'; cx.lineWidth=2*S;
  [-8,-2,5].forEach(function(xi){
    cx.beginPath(); cx.moveTo(xi*S,-2*S); cx.lineTo(xi*S,9*S); cx.stroke();
  });

  // хвост
  cx.strokeStyle='#e8783a'; cx.lineWidth=5*S; cx.lineCap='round';
  var tw=Math.sin(fc*0.15)*0.7;
  cx.beginPath();
  cx.moveTo(-16*S,6*S);
  cx.quadraticCurveTo(-28*S,-2*S+tw*9*S,-22*S,-19*S+tw*5*S);
  cx.stroke();

  // голова
  cx.fillStyle='#e8783a';
  cx.beginPath(); cx.arc(2*S,-12*S,13*S,0,Math.PI*2); cx.fill();
  cx.fillStyle='#f5c090';
  cx.beginPath(); cx.ellipse(2*S,-14*S,7*S,5*S,0,0,Math.PI*2); cx.fill();

  // уши
  cx.fillStyle='#e8783a';
  cx.beginPath(); cx.moveTo(-8*S,-21*S); cx.lineTo(-18*S,-33*S); cx.lineTo(-2*S,-22*S); cx.fill();
  cx.beginPath(); cx.moveTo(11*S,-21*S); cx.lineTo(20*S,-33*S); cx.lineTo(5*S,-22*S); cx.fill();
  cx.fillStyle='#f5a0a0';
  cx.beginPath(); cx.moveTo(-8*S,-22*S); cx.lineTo(-14*S,-30*S); cx.lineTo(-3*S,-23*S); cx.fill();
  cx.beginPath(); cx.moveTo(11*S,-22*S); cx.lineTo(16*S,-30*S); cx.lineTo(6*S,-23*S); cx.fill();

  // глаза
  cx.fillStyle='#fff';
  cx.beginPath(); cx.ellipse(-5*S,-13*S,4.5*S,3.8*S,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(9*S,-13*S,4.5*S,3.8*S,0,0,Math.PI*2); cx.fill();
  cx.fillStyle='#2a8a20';
  cx.beginPath(); cx.arc(-5*S,-13*S,2.8*S,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(9*S,-13*S,2.8*S,0,Math.PI*2); cx.fill();
  cx.fillStyle='#000';
  cx.beginPath(); cx.arc(-5*S,-13*S,1.5*S,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(9*S,-13*S,1.5*S,0,Math.PI*2); cx.fill();

  // нос
  cx.fillStyle='#ff8fa8';
  cx.beginPath(); cx.arc(2*S,-9*S,2.2*S,0,Math.PI*2); cx.fill();

  // усы
  cx.strokeStyle='rgba(255,255,255,0.6)'; cx.lineWidth=S;
  [[2,-9,19,-8],[2,-9,19,-10],[2,-9,-15,-8],[2,-9,-15,-10]].forEach(function(p){
    cx.beginPath(); cx.moveTo(p[0]*S,p[1]*S); cx.lineTo(p[2]*S,p[3]*S); cx.stroke();
  });

  // лапы
  cx.fillStyle='#e8783a';
  if(run===0){
    cx.fillRect(-12*S,12*S,9*S,10*S);
    cx.fillRect(4*S,8*S,9*S,12*S);
  }else{
    cx.fillRect(-12*S,8*S,9*S,12*S);
    cx.fillRect(4*S,12*S,9*S,10*S);
  }
  cx.fillStyle='#f5a080';
  cx.beginPath(); cx.ellipse(-7*S,23*S,5.5*S,3*S,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(9*S,23*S,5.5*S,3*S,0,0,Math.PI*2); cx.fill();

  cx.restore();
}

var catDir=1, catAF=0, catAT=0, catInv=0;

function drawHUD() {
  // панель счёта
  cx.fillStyle='rgba(0,0,0,0.6)';
  cx.fillRect(4*S,4*S,140*S,30*S);
  cx.strokeStyle='rgba(255,215,0,0.4)'; cx.lineWidth=1;
  cx.strokeRect(4*S,4*S,140*S,30*S);
  cx.fillStyle='#ffd700'; cx.font='bold '+Math.round(12*S)+'px monospace'; cx.textAlign='left';
  cx.fillText('СЧЁТ: '+score, 10*S, 25*S);

  // жизни
  cx.textAlign='right'; cx.fillStyle='#ff6b6b';
  var h=''; for(var i=0;i<lives;i++) h+='❤';
  cx.fillText(h||'💀', W-6*S, 25*S);

  // уровень
  cx.textAlign='center'; cx.fillStyle='rgba(0,0,0,0.5)';
  cx.fillRect(W/2-25*S,4*S,50*S,18*S);
  var lhue=Math.max(0,120-level*13);
  cx.fillStyle='hsl('+lhue+',80%,55%)';
  cx.font='bold '+Math.round(9*S)+'px monospace';
  cx.fillText('LVL '+level, W/2, 17*S);

  // шкала сложности
  var pct=Math.min(1,(level-1)/9);
  cx.fillStyle='rgba(0,0,0,0.4)'; cx.fillRect(W/2-44*S,25*S,88*S,5*S);
  var bg=cx.createLinearGradient(W/2-44*S,0,W/2+44*S,0);
  bg.addColorStop(0,'#00e676'); bg.addColorStop(.5,'#ffeb3b'); bg.addColorStop(1,'#ff1744');
  cx.fillStyle=bg; cx.fillRect(W/2-44*S,25*S,88*S*pct,5*S);

  if(level>=7){
    var a=0.45+0.45*Math.sin(fc*0.14);
    cx.fillStyle='rgba(255,40,40,'+a+')';
    cx.font='bold '+Math.round(9*S)+'px monospace'; cx.textAlign='center';
    cx.fillText('⚠ РЕЖИМ СНАЙПЕРА ⚠',W/2,FL-8*S);
  }else if(level>=4){
    cx.fillStyle='rgba(255,165,0,0.65)';
    cx.font=Math.round(8*S)+'px monospace'; cx.textAlign='center';
    cx.fillText('Скорость растёт!',W/2,FL-8*S);
  }
}

function drawSplash() {
  cx.fillStyle='#060c18'; cx.fillRect(0,0,W,H);

  // BG rays
  cx.save(); cx.translate(W/2, H*.42);
  for(var i=0;i<8;i++){
    var a=(i/8)*Math.PI*2+sTimer*0.005;
    cx.strokeStyle='rgba(0,220,200,'+(0.04+0.02*Math.sin(sTimer*0.04+i))+')';
    cx.lineWidth=18*S;
    cx.beginPath(); cx.moveTo(0,0);
    cx.lineTo(Math.cos(a)*280*S, Math.sin(a)*280*S);
    cx.stroke();
  }
  cx.restore();

  // Cyan glow behind can
  var pulse=0.15+0.08*Math.sin(sTimer*0.04);
  var gr=cx.createRadialGradient(W/2,H*.42,10,W/2,H*.42,160*S);
  gr.addColorStop(0,'rgba(0,220,200,'+pulse+')');
  gr.addColorStop(1,'transparent');
  cx.fillStyle=gr; cx.fillRect(0,0,W,H);

  // Real can image
  var CH=Math.round(H*0.52), CW=Math.round(CH*0.52);
  var cx2=W/2-CW/2;
  var cy2=H*0.08;
  var bob=Math.sin(sTimer*0.04)*4*S;

  // Can shadow
  cx.save();
  cx.globalAlpha=0.35;
  var sh=cx.createRadialGradient(W/2,cy2+CH+bob,0,W/2,cy2+CH+bob,CW*0.7);
  sh.addColorStop(0,'rgba(0,0,0,0.8)');
  sh.addColorStop(1,'transparent');
  cx.fillStyle=sh;
  cx.beginPath(); cx.ellipse(W/2,cy2+CH+bob,CW*0.55,12*S,0,0,Math.PI*2); cx.fill();
  cx.restore();

  if(canImg){
    cx.save();
    cx.translate(W/2, cy2+CH/2+bob);
    // subtle tilt
    cx.rotate(Math.sin(sTimer*0.025)*0.04);
    cx.drawImage(canImg,-CW/2,-CH/2,CW,CH);
    cx.restore();
  }

  // Brand name
  cx.textAlign='center';
  cx.shadowColor='#00dcc8'; cx.shadowBlur=20*S;
  cx.fillStyle='#fff';
  cx.font='bold '+Math.round(28*S)+'px Arial,sans-serif';
  cx.fillText('LiT ENERGY',W/2,H*0.72);
  cx.shadowBlur=0;

  cx.fillStyle='#00dcc8';
  cx.font=Math.round(10*S)+'px monospace';
  cx.fillText('ЗАРЯЖАЙ ПОБЕДУ ⚡',W/2,H*0.775);

  var pb=.4+.55*Math.sin(sTimer*.08);
  cx.fillStyle='rgba(200,200,200,'+pb+')';
  cx.font=Math.round(12*S)+'px monospace';
  cx.fillText(sReady?'ТАП / НАЖМИ — ИГРАТЬ':'загрузка...',W/2,H*0.865);

  cx.fillStyle='rgba(80,80,80,0.55)';
  cx.font=Math.round(8*S)+'px monospace';
  cx.fillText('представляет  ВОДНЫЙ КОНГ',W/2,H*0.92);
}

function drawDead() {
  cx.fillStyle='rgba(10,0,0,0.88)'; cx.fillRect(0,0,W,H);
  cx.textAlign='center';
  cx.shadowColor='#ff2020'; cx.shadowBlur=16*S;
  cx.fillStyle='#ff4455'; cx.font='bold '+Math.round(28*S)+'px Arial,sans-serif';
  cx.fillText('GAME OVER',W/2,H/2-44*S);
  cx.shadowBlur=0;
  cx.fillStyle='#aaa'; cx.font=Math.round(12*S)+'px monospace';
  cx.fillText('Котёнок не уцелел...',W/2,H/2-12*S);
  cx.shadowColor='#ffd700'; cx.shadowBlur=10*S;
  cx.fillStyle='#ffd700'; cx.font='bold '+Math.round(24*S)+'px monospace';
  cx.fillText(score+' очков',W/2,H/2+20*S);
  cx.shadowBlur=0;
  cx.fillStyle='rgba(150,200,255,'+(0.4+0.5*Math.sin(fc*.08))+')';
  cx.font=Math.round(12*S)+'px monospace';
  cx.fillText('ТАП / ПРОБЕЛ — снова',W/2,H/2+54*S);
}


// ── бонусная банка Lit Energy ──
function spawnBonus() {
  var bx = 28*S + Math.random()*(W - 56*S);
  bonus = {x: bx, y: FL - 22*S, w: 28*S, h: 48*S, pulse: 0, alive: true};
}

function drawBonus() {
  if (!bonus || !bonus.alive) return;
  bonus.pulse++;
  var bob = Math.sin(bonus.pulse * 0.08) * 3*S;
  cx.save();
  cx.translate(bonus.x, bonus.y + bob);

  // Glow ring
  var glow = 0.4 + 0.4*Math.sin(bonus.pulse * 0.1);
  var gr = cx.createRadialGradient(0,0,8*S,0,0,28*S);
  gr.addColorStop(0, 'rgba(0,220,200,'+glow+')');
  gr.addColorStop(1, 'transparent');
  cx.fillStyle = gr;
  cx.beginPath(); cx.arc(0, 0, 28*S, 0, Math.PI*2); cx.fill();

  // Can image
  if (shieldImg) {
    cx.drawImage(shieldImg, -bonus.w/2, -bonus.h/2, bonus.w, bonus.h);
  } else {
    cx.fillStyle = '#00dcc8';
    cx.fillRect(-bonus.w/2, -bonus.h/2, bonus.w, bonus.h);
    cx.fillStyle = '#fff';
    cx.font = 'bold '+Math.round(7*S)+'px monospace';
    cx.textAlign = 'center';
    cx.fillText('LIT', 0, 4*S);
  }

  // Shield icon
  cx.fillStyle = 'rgba(0,220,200,'+(0.7+0.3*Math.sin(bonus.pulse*0.12))+')';
  cx.font = Math.round(10*S)+'px monospace';
  cx.textAlign = 'center';
  cx.fillText('⚡', 0, -bonus.h/2 - 8*S);

  cx.restore();
}

function drawShield() {
  if (shieldTimer <= 0) return;
  var catY = FL - 20*S;
  var alpha = Math.min(1, shieldTimer/30) * (0.5 + 0.4*Math.sin(fc*0.2));
  // Shield bubble around cat
  cx.save();
  cx.globalAlpha = alpha;
  var gr = cx.createRadialGradient(catX, catY, 10*S, catX, catY, 32*S);
  gr.addColorStop(0, 'rgba(0,220,200,0.15)');
  gr.addColorStop(0.7, 'rgba(0,220,200,0.3)');
  gr.addColorStop(1, 'rgba(0,220,200,0)');
  cx.fillStyle = gr;
  cx.beginPath(); cx.arc(catX, catY, 32*S, 0, Math.PI*2); cx.fill();
  // Ring
  cx.globalAlpha = alpha * 0.8;
  cx.strokeStyle = '#00dcc8';
  cx.lineWidth = 2*S;
  cx.beginPath(); cx.arc(catX, catY, 30*S, 0, Math.PI*2); cx.stroke();
  cx.restore();

  // Timer bar
  var pct = shieldTimer / 360; // 6 sec = 360 frames
  cx.save();
  cx.fillStyle = 'rgba(0,0,0,0.5)';
  cx.fillRect(W/2-44*S, H-20*S, 88*S, 8*S);
  var sg = cx.createLinearGradient(W/2-44*S,0,W/2+44*S,0);
  sg.addColorStop(0,'#00dcc8'); sg.addColorStop(1,'#00ff88');
  cx.fillStyle = sg;
  cx.fillRect(W/2-44*S, H-20*S, 88*S*pct, 8*S);
  cx.fillStyle = '#00dcc8';
  cx.font = 'bold '+Math.round(7*S)+'px monospace';
  cx.textAlign = 'center';
  cx.fillText('⚡ SHIELD', W/2, H-23*S);
  cx.restore();
}

// главный цикл
function loop() {
  requestAnimationFrame(loop);
  cx.clearRect(0,0,W,H);

  if (imgOk < 2 || state==='loading') {
    cx.fillStyle='#060c18'; cx.fillRect(0,0,W,H);
    cx.fillStyle='#ffd700'; cx.font='bold '+Math.round(14*S)+'px monospace'; cx.textAlign='center';
    cx.fillText('Загрузка...'+imgOk+'/4',W/2,H/2);
    if(imgOk>=4) { state='splash'; sTimer=0; }
    return;
  }

  if (state==='splash') {
    sTimer++; if(sTimer>50) sReady=true;
    drawSplash(); return;
  }

  drawBG();
  drawShadows();
  drawDep();

  // частицы
  for(var pi=0;pi<parts.length;pi++){
    var p=parts[pi];
    cx.save(); cx.globalAlpha=p.life;
    cx.fillStyle=p.col;
    cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2); cx.fill();
    cx.restore();
  }

  for(var bi2=0;bi2<bottles.length;bi2++) drawBot(bottles[bi2]);
  drawShield();
  drawCat();
  drawBonus();
  drawHUD();

  if (state==='play') {
    fc++;

    // кот
    var spd=5.5*S;
    if(K['ArrowLeft']||K['KeyA']){catVX=-spd;catDir=-1;}
    else if(K['ArrowRight']||K['KeyD']){catVX=spd;catDir=1;}
    else catVX*=0.72;
    catX+=catVX;
    if(catX<18*S) catX=18*S;
    if(catX>W-18*S) catX=W-18*S;
    if(Math.abs(catVX)>0.5){catAT++;if(catAT>6){catAF++;catAT=0;}}
    if(catInv>0) catInv--;

    // депутат
    depMT++;
    var freq=Math.max(20,55-level*4);
    if(depMT>freq){
      depMT=0;
      depTX=Math.random()<0.88?catX:20*S+Math.random()*(W-40*S);
    }
    var ddx=depTX-depX;
    if(Math.abs(ddx)>2) depX+=Math.sign(ddx)*depSpd;
    if(depX<14*S) depX=14*S;
    if(depX>W-14*S) depX=W-14*S;

    // бутылки — строго вертикально
    for(var i=0;i<bottles.length;i++){
      var b=bottles[i];
      b.trail.push({x:b.x,y:b.y});
      if(b.trail.length>8) b.trail.shift();
      b.vy+=0.13*S;
      b.y+=b.vy;   // только Y! X не меняется!
      b.rot+=b.rs;
      if(b.y>H+40*S){b.dead=true;score+=4;}
    }
    bottles=bottles.filter(function(b){return!b.dead;});

    // столкновение — по X бутылки (фиксированному)
    if(catInv===0){
      for(var i=0;i<bottles.length;i++){
        var b=bottles[i];
        var hw=28*S, hh=36*S;
        var catY=FL-20*S;
        if(Math.abs(b.x-catX)<hw && Math.abs(b.y-catY)<hh){
          b.dead=true; lives--;catInv=80;
          addPts(catX,catY,'#ff4455',12);
          addPts(catX,catY,'#6ec6ff',10);
          if(lives<=0) state='dead';
        }
      }
    }

    // частицы
    for(var i=0;i<parts.length;i++){
      var p=parts[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.15*S; p.life-=0.025;
    }
    parts=parts.filter(function(p){return p.life>0;});


    // бонусная банка — появляется каждые 15-20 сек
    bonusTimer++;
    var nextBonus = bonusInterval + Math.floor(Math.random()*300);
    if (bonusTimer >= bonusInterval && !bonus) {
      spawnBonus();
      bonusTimer = 0;
      bonusInterval = 900 + Math.floor(Math.random()*300); // 15-20 sec
    }

    // подбор бонуса
    if (bonus && bonus.alive) {
      var bdx = Math.abs(bonus.x - catX);
      var bdy = Math.abs(bonus.y - (FL-20*S));
      if (bdx < 22*S && bdy < 28*S) {
        bonus.alive = false;
        bonus = null;
        shieldTimer = 360; // 6 секунд защиты
        addPts(catX, FL-20*S, '#00dcc8', 16);
        addPts(catX, FL-20*S, '#00ff88', 10);
      }
    }

    // щит — делает кота неуязвимым
    if (shieldTimer > 0) {
      shieldTimer--;
      catInv = Math.max(catInv, 2); // поддерживаем неуязвимость пока щит активен
    }

    if(sulT>0) sulT--;

    // спавн
    spawnT++;
    if(spawnT>=spawnI && bottles.length<maxB){
      spawnT=0; spawn();
      if(level>=5){var lv=level;setTimeout(function(){if(state==='play')spawn();},200);}
      if(level>=8){setTimeout(function(){if(state==='play')spawn();},400);}
    }

    // повышение уровня — бесконечно
    var nl=1+Math.floor(score/120);
    if(nl!==level){
      level=nl; applyDiff();
      addPts(W/2,H/2,'#ffd700',20);
      addPts(W/2,H/2,'#ff8c00',12);
    }

  } else if(state==='dead'){
    fc++; drawDead();
  }
}

requestAnimationFrame(loop);
</script>
</body>
